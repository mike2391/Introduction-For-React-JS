<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Just this 3 links if you wanna run react JS ⚛️ locally -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Don't use this in production: -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="nestedComponent"></div>

    <script type="text/babel">
        const root = ReactDOM.createRoot(document.getElementById('nestedComponent'));

        function Main({ children }) {
            return (
                <>
                    <h1>Hello This is Header</h1>
                    {children}
                </>
            )
        }

        function Content() {
            return (
                <p>this is content, passed as children</p>
            )
        }

        root.render(
            <Main>
                <Content />
            </Main>
        )
    </script>
</body>

</html>
