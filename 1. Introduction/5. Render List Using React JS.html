<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Render List in React</title>

    <!-- Just this 3 links if you wanna run react JS ⚛️ locally -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Don't use this in production: -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="list"></div>

    <script type="text/babel">
        const userList = ['Martin', 'William', 'Ashton'];

        const root = ReactDOM.createRoot(document.getElementById('list'));

        // Don't Forget to always start with capital letter
        function UserList() {
            return (
                <>
                    <h2>You just rendered a list using ReactJS ⚛️!!</h2>
                    <ul>
                        {
                            // The list is will still appear even without 'key' attribute
                            // But it would be more advisable to use 'key'
                            userList.map((user) => <li key={user}>{user}</li>)
                        }
                    </ul>
                </>
            )
        }
        root.render(<UserList />);
    </script>
</body>

</html>
