<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Just this 3 links if you wanna run react JS ⚛️ locally -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Don't use this in production: -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="counter"></div>

    <script type="text/babel">
        const counter = ReactDOM.createRoot(document.getElementById('counter'));

        function Button(props) {
            return (
                <button onClick={props.onClick} style={{ padding: '0.5rem' }}>
                    {props.name}
                </button>
            )
        }

        function Counter() {
            const [count, setCount] = React.useState(0);

            function Increment() {
                setCount(count + 1);
            }

            function Decrement() {
                setCount(count - 1);
            }

            function Reset() {
                setCount(0);
            }

            return (
                <>
                    <div style={{ display: 'flex', gap: '1rem', alignItems: 'center' }}>
                        <Button onClick={Decrement} name={'-'}></Button>
                        <div>Count: ({count})</div>
                        <Button onClick={Increment} name={'+'}></Button>
                    </div>
                    <Button onClick={Reset} name={"Reset"}></Button>
                </>
            )
        }

        counter.render(<Counter />);
    </script>
</body>

</html>
