<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Passing Props to Component</title>

    <!-- Just this 3 links if you wanna run react JS ⚛️ locally -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Don't use this in production: -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="component"></div>
    <div id="destructure"></div>

    <script type="text/babel">
        const component = document.getElementById('component');

        const root = ReactDOM.createRoot(component);

        // make sure your attribute name is same as your props name
        // example: {props.title} then you need to add attribute with name title: <Header title="Hello World"/>
        function Header(props) {
            return (<h1>You Just passing data using props to component: {props.title}</h1>)
        }

        function App() {
            return (

                <>
                    <Header title="Hello World" />
                </>
            );
        }

        root.render(<App />);
    </script>

    <!-- destructure props -->
    <script type="text/babel">
        const destructure = document.getElementById('destructure');

        const root2 = ReactDOM.createRoot(destructure);

        function Paragraph({ name, position }) {
            return (<p>my name is: {name}, and my position is: {position} </p>)
        }

        function Profile() {
            return (
                <>
                    <Paragraph name="John Doe" position="Web Developer" />
                </>
            )
        }
        root2.render(<Profile />);
    </script>

    <!-- props default form is an object, so you don't need to add {} -->
    <!-- it will be a different thing if you add {}. basically you declare static object -->
    <!-- if you don't add {} then it will be a dynamic object -->


    <!-- dynamic object example -->
    <!-- <Paragraph name="John Doe" position="Web Developer" /> = { name: "John Doe", position: "Web Developer" } -->
    <!-- function Paragraph(props) = inside props is { name: "John Doe", position: "Web Developer" } -->


    <!-- static object example -->
    <!-- <Paragraph name="John Doe" position="Web Developer" /> = { name: "John Doe", position: "Web Developer" } -->
    <!-- function Paragraph({ name, position, title}) = inside props is { name: "John Doe", position: "Web Developer", title: undefined} -->

    <!-- or  -->

    <!-- <Paragraph name = "John Doe" position = "Web Developer" title = "Web Developer" /> = { name: "John Doe", position: "Web Developer", title: "Web Developer" } -->
    <!-- function Paragraph({name, position,}) = inside props is only { name: "John Doe", position: "Web Developer"} -->
</body>

</html>
