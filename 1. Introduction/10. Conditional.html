<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Just this 3 links if you wanna run react JS ⚛️ locally -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Don't use this in production: -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="conditional"></div>

    <script type="text/babel">
        const root = ReactDOM.createRoot(document.getElementById('conditional'));

        function TaskList({ task, isDone, isDeleted }) {
            if (isDeleted) {
                return null
            } else {
                if (isDone) {
                    return (
                        <li><del>{task}</del> {isDone && '✅'}</li>
                    )
                } else {
                    return (
                        <li>{task}</li>
                    )
                }
            }

            // We can simplify it by using ternary operator
            // return isDone ? <li><del>{task}</del></li> : <li>{task}</li>

            // {isDOne && '✅'} -> it's Logical AND
        }

        function Task() {
            return (
                <ul>
                    <TaskList task="Learn JavaScript" isDone={true} />
                    <TaskList task="Learn React" isDone={true} />
                    <TaskList task="Get a job" isDone={false} />

                    {/* One Example for null component */}
                    <TaskList task="Learn TypeScript" isDone={false} isDeleted={true} />
                </ul>
            )
        }

        root.render(<Task />);
    </script>
</body>

</html>
