<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure and Impure Component</title>

    <!-- Just this 3 links if you wanna run react JS ⚛️ locally -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Don't use this in production: -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="notPureFunction"></div>

    <script type="text/babel">
        const root1 = ReactDOM.createRoot(document.getElementById('notPureFunction'));

        // In React, a component should behave like a pure function.
        // A pure component always returns the same output
        // when it receives the same props.
        //
        // It should NOT modify variables outside the component,
        // because that can create unpredictable UI behavior.
        //
        // In this example, NotPureComponent changes a global variable (count),
        // so its output depends on something outside its props.
        //
        // Meanwhile, PureComponent only uses props (id and text),
        // so it always produces predictable results.

        let count = 1;
        function NotPureComponent({ text }) {
            count++;  // modifying external variable → impure

            return (
                <tr>
                    <td>{count}</td>
                    <td>{text}</td>
                </tr>
            )
        }

        function PureComponent({ id, text }) {
            return (
                <tr>
                    <td>{id}</td>
                    <td>{text}</td>
                </tr>
            )
        }

        function Container() {
            const [refresh, setRefresh] = React.useState(false);

            return (
                <>
                    <h1>Not Pure Component</h1>
                    <table border="1">
                        <tbody>
                            <NotPureComponent text='one' />
                            <NotPureComponent text='two' />
                            <NotPureComponent text='three' />
                        </tbody>
                    </table>

                    <br />

                    <h1>Pure Component</h1>
                    <table border="1">
                        <tbody>
                            <PureComponent id={1} text='one' />
                            <PureComponent id={2} text='two' />
                            <PureComponent id={3} text='three' />
                        </tbody>
                    </table>

                    <br />

                    <button onClick={() => setRefresh(!refresh)}>
                        Re-render
                    </button>

                    <br />

                    <p>
                        When the button is clicked, React re-renders the Container component.
                        The numbers in the "Not Pure Component" table change because the component
                        modifies a global variable (count) every time it renders.
                        This makes the output depend on something outside its props.
                        Meanwhile, the "Pure Component" table does not change because it only uses props,
                        so it always produces the same result on every render.
                    </p>
                </>
            )
        }

        root1.render(
            <Container />
        );
    </script>
</body>

</html>
