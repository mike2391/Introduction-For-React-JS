<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Just this 3 links if you wanna run react JS ⚛️ locally -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Don't use this in production: -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="countWithoutState"></div>
    <div id="countUsingState"></div>

    <script type="text/babel">
        const root = ReactDOM.createRoot(document.getElementById('countWithoutState'));

        function CountWithoutState() {
            let countNoState = 0;

            function handleIncrement() {
                // this function will not work because we are not using state to store the count value 
                // The variable value will always be 0 and it will not change when we click the button
                // because the variable is re-initialized to 0 every time the component is rendered
                // React will re-render the component every time the state is updated.
                // React will not re-render the component when a variable is updated without using state
                countNoState++;

                // you will see the count value in the console.,
                // But it will not be updated in the UI because we are not using state to store the count value
                console.log(countNoState);
            }

            return (
                <>
                    <button onClick={handleIncrement}>Increment Without State</button>
                    <div>Count: {countNoState}</div>
                </>
            )
        }

        root.render(<CountWithoutState />)
    </script>

    <script type="text/babel">
        const container = ReactDOM.createRoot(document.getElementById('countUsingState'));

        // State is a data that can change over time
        // State is used to store data that might change over time

        // Hooks are functions that let you hook into React features
        // Hooks basically are function call
        // ex: useState is one example of the hooks

        function ExampleHook() {

            // "count" is a state
            // "setCount" is a setter, to update the state after the hook is called
            // The "useState" hook is called and sets the default value to 0 -> setCount as a "setter" change count from undefined to 0
            // now count = 0

            // if you want to update the state, you need to use the setter

            // generally, programmer will use "set+[state name]" for setter to update the state (ex:count -> setCount)
            // you can use any name you want for your setter (ex: [count, plusOne]), but it's not recommend and not the best practice for React
            const [count, setCount] = React.useState(0);


            function handleIncrement2() {
                // for now we use set updater function for simple example

                // we set the setter value to count + 1 and return it back to state count and let React do the magic!
                setCount(count + 1);
            }

            return (
                <>
                    <br />
                    <button onClick={handleIncrement2}>Increment Using State</button>
                    <div>Count: ({count})</div>
                </>
            )
        }

        container.render(<ExampleHook />);
    </script>
</body>

</html>
