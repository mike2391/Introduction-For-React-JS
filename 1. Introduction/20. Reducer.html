<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- Just this 3 links if you wanna run react JS ⚛️ locally -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Don't use this in production: -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>

  <body>
    <div id="reducer"></div>

    <script type="text/babel">
      function NoteForm({ onAddNote }) {
        const [text, setText] = React.useState("");

        function handleChange(e) {
          setText(e.target.value);
        }

        function handleClick() {
          onAddNote(text);
          setText("");
        }

        return (
          <>
            <input placeholder="Add Note" value={text} onChange={handleChange} />
            <button onClick={handleClick}>Add Note</button>
          </>
        );
      }

      function Note({ note, onChange, onDelete }) {
        const [isEdit, setIsEdit] = React.useState(false);

        let component;

        function handleChangeText(e) {
          const newNote = { ...note, text: e.target.value };
          onChange(newNote);
        }

        if (isEdit) {
          component = (
            <>
              <input value={note.text} onChange={handleChangeText} />
              <button onClick={() => setIsEdit(false)}>Save</button>
            </>
          );
        } else {
          component = (
            <>
              <p>{note.text}</p>
              <button onClick={() => setIsEdit(true)}>Edit</button>
            </>
          );
        }

        function handleChangeDone(e) {
          const newNote = { ...note, isDone: e.target.checked };
          onChange(newNote);
        }

        return (
          <label>
            <input type="checkbox" checked={note.isDone} onChange={handleChangeDone} />
            {component}
            <button onClick={() => onDelete(note)}>Delete</button>
          </label>
        );
      }

      function NoteList({ notes, onChange, onDelete }) {
        return (
          <ul>
            {notes.map((note) => (
              <li key={note.id}>
                <Note note={note} onChange={onChange} onDelete={onDelete} />
              </li>
            ))}
          </ul>
        );
      }

      let id = 0;
      const initialNotes = [
        { id: id++, text: "Learn React", isDone: false },
        { id: id++, text: "Learn JavaScript", isDone: false },
      ];

      function noteReducer(notes, action) {
        switch (action.type) {
          case "ADD_NOTE":
            return [...notes, { id: id++, text: action.text, isDone: false }];
          case "CHANGE_NOTE":
            return notes.map((note) => (note.id === action.id ? { ...note, text: action.text, isDone: action.isDone } : note));
          case "DELETE_NOTE":
            return notes.filter((note) => note.id !== action.id);
          default:
            return notes;
        }
      }

      function NoteApp() {
        const [notes, dispatch] = React.useReducer(noteReducer, initialNotes);

        function handleAddNote(text) {
          dispatch({ type: "ADD_NOTE", text });
        }

        function handleChangeNote(newNote) {
          dispatch({ type: "CHANGE_NOTE", ...newNote });
        }

        function handleDeleteNote(noteToDelete) {
          dispatch({ type: "DELETE_NOTE", id: noteToDelete.id });
        }

        return (
          <>
            <h1>Note App</h1>
            <NoteForm onAddNote={handleAddNote} />
            <NoteList notes={notes} onChange={handleChangeNote} onDelete={handleDeleteNote} />
          </>
        );
      }

      // For More Example, checkout 2. Build React in Vite/6. Reducer
      ReactDOM.createRoot(document.getElementById("reducer")).render(<NoteApp />);
    </script>
  </body>
</html>
