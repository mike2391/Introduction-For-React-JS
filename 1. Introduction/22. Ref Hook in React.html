<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Just this 3 links if you wanna run react JS ⚛️ locally -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Don't use this in production: -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="refHook"></div>

    <script type="text/babel">
        function Button(){
            // Ref/useRef is a React Hook that lets you create a mutable value that which not trigger re-render

            const count = React.useRef(0);

            function handleClick(){
                alert('You just clicked the button! ' + count.current++);
            }
            return <button onClick={handleClick}>Click</button>
        }

        function Cointainer(){
            return <Button/>
        }

        ReactDOM.createRoot(document.getElementById('refHook')).render(<Cointainer />);
    </script>
</body>

</html>
